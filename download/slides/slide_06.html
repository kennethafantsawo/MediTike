<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<title>MediTike — La concurrence</title>
<link rel="stylesheet" href="global.css">
<script src="https://artifacts-cdn.chatglm.site/https://cdn.tailwindcss.com" data-z-original-src="https://cdn.tailwindcss.com"></script>
<link href="https://artifacts-cdn.chatglm.site/https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" data-z-original-href="https://fonts.googleapis.com/icon?family=Material+Icons">
<style>
  body { background: var(--bg); }
  .section-tag {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--accent);
  }
  .h1 {
    font-family: var(--font-heading);
    font-weight: 800;
    color: var(--primary);
    font-size: 44px;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .h3-muted {
    font-family: var(--font-body);
    font-weight: 500;
    color: var(--muted);
    font-size: 18px;
    line-height: 1.4;
  }
  .accent-bar {
    width: 36px; height: 3px;
    background: var(--accent);
    border-radius: 2px;
  }
  .ghost-grid {
    position: absolute;
    top: 60px; right: -100px;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(15,81,50,0.06) 0%, rgba(15,81,50,0) 70%);
    filter: blur(36px);
    pointer-events: none;
  }

  /* Comparison table */
  .comp-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(15,81,50,0.04);
  }
  .comp-table thead th {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 14px 18px;
    text-align: left;
    background: #faf8f4;
    border-bottom: 2px solid var(--primary);
  }
  .comp-table thead th.crit-h {
    color: var(--muted);
    width: 28%;
  }
  .comp-table thead th.other-h {
    color: var(--muted);
    width: 36%;
  }
  .comp-table thead th.mt-h {
    color: var(--accent);
    background: rgba(184,153,104,0.10);
    border-left: 4px solid var(--accent);
    position: relative;
  }
  .comp-table thead th.mt-h .mt-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-size: 10px;
    margin-left: 8px;
    letter-spacing: 0.10em;
  }
  .comp-table tbody td {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-body);
    font-size: 13.5px;
    line-height: 1.5;
    vertical-align: middle;
    color: #2c3a32;
  }
  .comp-table tbody tr:last-child td {
    border-bottom: none;
  }
  .crit-cell {
    font-family: var(--font-heading);
    font-weight: 700;
    color: var(--primary);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .crit-cell .material-icons {
    font-size: 18px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .other-cell {
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .other-cell .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c8bca8;
    flex-shrink: 0;
  }
  .mt-cell {
    color: var(--primary);
    background: rgba(184,153,104,0.06);
    border-left: 4px solid var(--accent);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mt-cell .material-icons {
    font-size: 16px;
    color: var(--primary);
    flex-shrink: 0;
  }

  /* Bottom quote card */
  .quote-card {
    background: white;
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 12px rgba(15,81,50,0.03);
  }
  .quote-mark {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 44px;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }
  .quote-text {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.55;
    color: var(--fg);
    font-style: italic;
    font-weight: 500;
  }
  .quote-text .accent-word {
    color: var(--primary);
    font-weight: 700;
    font-style: normal;
  }
</style>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MediTike — Couverture</title>
<link rel="stylesheet" href="global.css">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<div class="slide slide-dark">
  <div class="kente-bar" style="position:absolute;top:0;left:0;right:0;"></div>

  <!-- Logo -->
  <div class="logo-mark logo-mark-dark" style="position:relative;z-index:2;">
    <div class="logo-icon">M</div>
    <span>MediTike</span>
  </div>

  <!-- Contenu centré -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:2;">
    <h1 class="font-display" style="font-size:56px;color:var(--fg-light);line-height:1.05;margin-bottom:8px;">MediTike</h1>
    <p class="font-display" style="font-size:36px;color:var(--accent-light);line-height:1.2;margin-bottom:24px;font-weight:600;">La santé à portée de main</p>
    <p style="font-size:18px;color:var(--muted-light);max-width:600px;line-height:1.6;">
      La plateforme togolaise qui connecte les patients aux pharmacies de garde en temps réel. Une demande, plusieurs réponses, un seul déplacement.
    </p>
  </div>

  <!-- Stats en bas -->
  <div style="display:flex;gap:48px;padding-top:24px;border-top:1px solid var(--border-light);position:relative;z-index:2;">
    <div>
      <div class="font-num" style="font-size:36px;color:var(--accent-light);line-height:1;">~100</div>
      <p style="font-size:12px;color:var(--muted-light);margin-top:6px;">pharmacies de garde</p>
    </div>
    <div>
      <div class="font-num" style="font-size:36px;color:var(--accent-light);line-height:1;">7</div>
      <p style="font-size:12px;color:var(--muted-light);margin-top:6px;">villes togolaises</p>
    </div>
    <div>
      <div class="font-num" style="font-size:36px;color:var(--accent-light);line-height:1;">&lt;5min</div>
      <p style="font-size:12px;color:var(--muted-light);margin-top:6px;">pour trouver son médicament</p>
    </div>
  </div>

  <p style="position:absolute;bottom:24px;right:72px;font-size:11px;color:var(--muted-light);">Lomé, Togo · 2026</p>
</div>
</body>
</html>
